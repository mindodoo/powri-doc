version: 2
updates:
  # npm / Node.js dependencies
  - package-ecosystem: "npm"
    directory: "/" # location of package.json — change if it's not in the root
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    groups:
      # Bundle minor/patch updates into one PR instead of one PR per package
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Always raise major version bumps as separate PRs (these can break things)
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "tech-debt"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions workflow files — recommended even if you only use npm,
  # since your CI/CD pipeline itself has dependencies (actions/checkout, etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "dependencies"
      - "ci"
